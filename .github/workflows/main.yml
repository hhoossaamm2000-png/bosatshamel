name: Run Bosta Shamel Automation

on:
  workflow_dispatch: 
  schedule:
    # يشتغل الساعة 22:00 و 10:00 بتوقيت UTC (يعادل 1 بليل و 1 الظهر بتوقيت مصر)
    - cron: '0 22,10 * * *' 

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Install Dependencies
      run: npm install

    - name: Run Script
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        CHAT_ID: ${{ secrets.CHAT_ID }}
        BOSTA_USER: ${{ secrets.BOSTA_USER }}
        BOSTA_PASS: ${{ secrets.BOSTA_PASS }}
      run: node index.js
